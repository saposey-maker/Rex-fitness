// ── storage ──────────────────────────────────────────────────
function getKey(d) { return `gym_${d}`; }
function loadDate(date) { try { return JSON.parse(localStorage.getItem(getKey(date))) || null; } catch { return null; } }
function persistDate(date, data) { try { localStorage.setItem(getKey(date), JSON.stringify(data)); } catch {} }
function allSessions() {
const out = [];
for (let i = 0; i < localStorage.length; i++) {
const k = localStorage.key(i);
if (k && k.startsWith(“gym_”)) {
try { out.push({ date: k.slice(4), …JSON.parse(localStorage.getItem(k)) }); } catch {}
}
}
return out.sort((a, b) => b.date.localeCompare(a.date));
}
function lastSessionBefore(date) {
const s = allSessions().filter(x => x.date < date && x.exercises);
return s.length ? s[0] : null;
}
function blankSets() {
const obj = {};
SETS.forEach(s => { obj[s] = { weight: “”, reps: “12”, done: false }; });
return obj;
}
function blankExercises(list) {
const obj = {};
list.forEach(ex => { obj[ex.id] = blankSets(); });
return obj;
}

// ── export helpers ───────────────────────────────────────────
function sessionsInRange(from, to) {
return allSessions().filter(s => s.date >= from && s.date <= to);
}

function buildCSV(sessions) {
const rows = [[“Date”,“Exercise”,“Set”,“Weight (lbs)”,“Reps”,“Done”,“Start Time”,“End Time”,“Duration”,“Note”]];
sessions.forEach(s => {
const exList = s.activeExercises || DEFAULT_EXERCISES;
const dur = (() => { if (!s.startTs||!s.endTs) return “”; const m=Math.round((new Date(s.endTs)-new Date(s.startTs))/60000); return m<60?`${m}m`:`${Math.floor(m/60)}h ${m%60}m`; })();
exList.forEach(ex => {
[1,2,3].forEach(setNum => {
const d = s.exercises?.[ex.id]?.[setNum] || {};
rows.push([
s.date, ex.name, setNum,
d.weight||””, d.reps||””, d.done?“yes”:“no”,
s.startTs ? new Date(s.startTs).toLocaleTimeString(“en-US”,{hour:“numeric”,minute:“2-digit”}) : “”,
s.endTs   ? new Date(s.endTs).toLocaleTimeString(“en-US”,{hour:“numeric”,minute:“2-digit”})   : “”,
dur, s.note||””
]);
});
});
});
return rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(”,”)).join(”\n”);
}

function downloadCSV(sessions, filename) {
const csv = buildCSV(sessions);
const blob = new Blob([csv], { type:“text/csv” });
const url = URL.createObjectURL(blob);
const a = document.createElement(“a”);
a.href = url; a.download = filename; a.click();
URL.revokeObjectURL(url);
}

function buildPrintHTML(sessions) {

const dur = (() => { if (!s.startTs||!s.endTs) return “”; const m=Math.round((new Date(s.endTs)-new Date(s.startTs))/60000); return m<60?`${m}m`:`${Math.floor(m/60)}h ${m%60}m`; })();
const startStr = s.startTs ? new Date(s.startTs).toLocaleTimeString(“en-US”,{hour:“numeric”,minute:“2-digit”}) : “”;
const endStr   = s.endTs   ? new Date(s.endTs).toLocaleTimeString(“en-US”,{hour:“numeric”,minute:“2-digit”})   : “”;

  </style></head><body>

  <h1>💪 Rex Strength Log</h1>
  <div class="subtitle">Exported ${new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})} · ${sessions.length} session${sessions.length!==1?"s":""}</div>

}

// ── draggable list — handle-only ─────────────────────────────
function DraggableList({ items, onReorder, renderItem }) {
const [dragIdx, setDragIdx] = useState(null);
const [overIdx, setOverIdx] = useState(null);
const [ghost, setGhost]     = useState(null);
const itemRefs              = useRef([]);
const drag                  = useRef({});

function startDrag(e, idx) {
e.stopPropagation();
const touch = e.touches[0];
const el    = itemRefs.current[idx];
const rect  = el.getBoundingClientRect();
drag.current = { offsetY: touch.clientY - rect.top };
setGhost({ x: rect.left, y: rect.top, w: rect.width, h: rect.height });
setDragIdx(idx);
setOverIdx(idx);
}

function onTouchMove(e) {
if (dragIdx === null) return;
e.preventDefault();
const touch = e.touches[0];
setGhost(g => ({ …g, y: touch.clientY - drag.current.offsetY }));
let closest = dragIdx, closestDist = Infinity;
itemRefs.current.forEach((el, i) => {
if (!el || i === dragIdx) return;
const r = el.getBoundingClientRect();
const dist = Math.abs(touch.clientY - (r.top + r.height / 2));
if (dist < closestDist) { closestDist = dist; closest = i; }
});
setOverIdx(closest);
}

function onTouchEnd() {
if (dragIdx !== null && overIdx !== null && dragIdx !== overIdx) {
const next = […items];
const [moved] = next.splice(dragIdx, 1);
next.splice(overIdx, 0, moved);
onReorder(next);
}
setDragIdx(null); setOverIdx(null); setGhost(null); drag.current = {};
}

return (
<div onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onTouchCancel={onTouchEnd}>
{ghost && dragIdx !== null && (
<div style={{ position:“fixed”, left:ghost.x, top:ghost.y, width:ghost.w, pointerEvents:“none”, zIndex:500, opacity:0.93, boxShadow:“0 8px 32px #000000aa”, borderRadius:6, transform:“scale(1.02)” }}>
{renderItem(items[dragIdx], dragIdx, true, null)}
</div>
)}
{items.map((item, idx) => (
<div key={item.id} ref={el => { itemRefs.current[idx] = el; }}
style={{ opacity: dragIdx===idx ? 0.2 : 1, outline: overIdx===idx && dragIdx!==idx ? `2px solid ${C.teal}` : “none”, outlineOffset:2, borderRadius:6, marginBottom:10 }}>
{renderItem(item, idx, false, e => startDrag(e, idx))}
</div>
))}
</div>
);
}

// ── app ───────────────────────────────────────────────────────
export default function App() {
const [activeDate, setActiveDate] = useState(todayStr());
const isToday = activeDate === todayStr();

function loadForDate(date) {
const saved = loadDate(date);
return {
activeExercises: saved?.activeExercises || DEFAULT_EXERCISES,
exercises:       saved?.exercises       || blankExercises(DEFAULT_EXERCISES),
synced:          saved?.synced          || false,
note:            saved?.note            || “”,
startTs:         saved?.startTs         || null,
endTs:           saved?.endTs           || null,
};
}

const initial = loadForDate(activeDate);
const [activeExercises, setActiveExercises] = useState(initial.activeExercises);
const [exercises, setExercises]             = useState(initial.exercises);
const [synced, setSynced]                   = useState(initial.synced);
const [note, setNote]                       = useState(initial.note);
const [startTs, setStartTs]                 = useState(initial.startTs);
const [endTs, setEndTs]                     = useState(initial.endTs);
const [view, setView]                       = useState(“workout”);
const [modal, setModal]                     = useState(null);
const [showAdd, setShowAdd]                 = useState(false);
const [showDatePicker, setShowDatePicker]   = useState(false);
const [showExport, setShowExport]           = useState(false);

// start timestamp for today only on first load
useEffect(() => {
if (isToday && !startTs) setStartTs(nowISO());
}, []);

// switch date
function switchDate(date) {
setActiveDate(date);
const d = loadForDate(date);
setActiveExercises(d.activeExercises);
setExercises(d.exercises);
setSynced(d.synced);
setNote(d.note);
setStartTs(d.startTs || (date === todayStr() ? nowISO() : null));
setEndTs(d.endTs);
setView(“workout”);
}

// persist on every change
useEffect(() => {
persistDate(activeDate, { activeExercises, exercises, synced, note, startTs, endTs });
});

// ── sync ─────────────────────────────────────────────────────
function handleSync(checked) {
setSynced(checked);
if (checked) {
const last = lastSessionBefore(activeDate);
if (!last) return;
setExercises(prev => {
const next = JSON.parse(JSON.stringify(prev));
activeExercises.forEach(ex => SETS.forEach(s => {
const w = last.exercises?.[ex.id]?.[s]?.weight;
if (w) { next[ex.id]=next[ex.id]||blankSets(); next[ex.id][s].weight=w; next[ex.id][s].reps=last.exercises[ex.id][s].reps||“12”; }
}));
return next;
});
} else { setExercises(blankExercises(activeExercises)); }
}

function addExercise(ex) {
setActiveExercises(p => […p, ex]);
setExercises(p => ({ …p, [ex.id]: blankSets() }));
}
function removeExercise(exId) { setActiveExercises(p => p.filter(e => e.id!==exId)); setModal(null); }
function resetEx(exId)        { setExercises(p => ({ …p, [exId]: blankSets() })); setModal(null); }
function updateSet(exId, n, field, val) {
setExercises(p => ({ …p, [exId]: { …p[exId], [n]: { …p[exId][n], [field]: val } } }));
}
function toggleDone(exId, n) {
setExercises(p => ({ …p, [exId]: { …p[exId], [n]: { …p[exId][n], done: !p[exId][n].done } } }));
}
function resetSession() {
setActiveExercises(DEFAULT_EXERCISES); setExercises(blankExercises(DEFAULT_EXERCISES));
setSynced(false); setNote(””); setStartTs(isToday ? nowISO() : null); setEndTs(null);
setView(“workout”); setModal(null);
}

const totalSets     = activeExercises.length * SETS.length;
const completedSets = activeExercises.reduce((a, ex) => a + SETS.filter(s => exercises[ex.id]?.[s]?.done).length, 0);
const pct           = totalSets > 0 ? Math.round((completedSets/totalSets)*100) : 0;
const allDone       = totalSets > 0 && completedSets === totalSets;

const S = {
app:       { fontFamily:”‘DM Mono’,‘Courier New’,monospace”, background:C.bg, minHeight:“100vh”, color:C.text, maxWidth:480, margin:“0 auto”, paddingBottom:80 },
hdr:       { background:C.surface, borderBottom:`1px solid ${C.border}`, padding:“14px 18px 12px”, position:“sticky”, top:0, zIndex:100 },

tabs:      { display:“flex”, gap:6 },
